description = "凍結済み feature-contract から失敗するテストを作成し RED 証跡を残す"

prompt = """
あなたは TDD の RED を確立する担当です。

参照先: `.claude/skills/spec-to-tests/SKILL.md`（正本）、`.claude/rules/20-tdd-protocol.md`。

## 目的
契約のテスト観点を、実行可能な失敗テストへ変換して RED を確立する。

## 入力
`harness/contracts/<feature-id>.md`（凍結契約）、active-profile が指す
backend / frontend / testing profile の「テストコマンド」。

## 実行手順
1. テスト観点表の各行を 1 テストにマッピングする（1 観点 = 1 テスト）。
2. 実装より先に、期待挙動を明示した失敗するテストを書く。
3. 選択中 profile の「テストコマンド」で実行し、全件失敗を確認する。
4. 失敗ログを保存する。

## 禁止事項
- 実装コードを書く。テストの弱体化 / skip / todo。技術固有コマンドの直書き。
  未選択 profile の参照。テスト観点は `harness/contracts/<feature-id>.md` に従う。

## 出力フォーマット
生成テスト一覧、観点↔テスト対応表。

## 証跡保存先
RED 証跡 → `harness/evidence/<feature-id>/red.log`。
"""
